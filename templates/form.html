<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Get Your Worksheets — {{ book_title }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f9f6f1;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 8px;
      padding: 2.5rem 2rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    .label-book {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.4rem;
      line-height: 1.4;
      margin-bottom: 0.75rem;
      color: #111;
    }

    p {
      font-size: 0.95rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: bold;
      margin-bottom: 0.3rem;
      color: #333;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 0.95rem;
      margin-bottom: 1.1rem;
      background: #fafafa;
      color: #111;
      transition: border 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #b5893a;
      background: #fff;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      background: #b5893a;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-family: 'Georgia', serif;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #9a7230; }

    .footer-note {
      margin-top: 1.25rem;
      font-size: 0.78rem;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="label-book">The Manufacturing Strategy Series</p>
    <h1>Get Your Free Worksheets</h1>
    <p>
      Enter your name and email below. Your worksheets for
      <strong>{{ book_title }}</strong> will be sent to your inbox instantly.
    </p>

    <form method="POST" action="/{{ book_id }}">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" placeholder="e.g. Ramesh Kumar" required />

      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />

      <button type="submit">Send My Worksheets →</button>
    </form>

    <p class="footer-note">No spam. Just your worksheets. Unsubscribe anytime.</p>
  </div>
</body>
</html>
